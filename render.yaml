services:
  - type: web
    name: drivementor-backend
    env: docker
    plan: free
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: PORT
        value: 8080
      - key: DB_HOST
        fromDatabase:
          name: drivementor_db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: drivementor_db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: drivementor_db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: drivementor_db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: drivementor_db
          property: password
      - key: DB_SSL_MODE
        value: require

databases:
  - name: drivementor_db
    databaseName: drive_mentor
    plan: free
